<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>阴阳人格 · 能量内核测评</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  background:#faf8f5; color:#2d2d3a; line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
#cover {
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:linear-gradient(165deg,#080812,#12102a,#1a0f20);
  color:#f0e6d3; padding:40px 24px;
}
.cover-icon { font-size:48px; margin-bottom:8px; }
.cover-title { font-size:24px; font-weight:700; line-height:1.4; margin-bottom:6px; }
.cover-title .hl { color:#d4a574; }
.cover-sub { font-size:13px; color:rgba(240,230,211,0.4); line-height:1.5; margin-bottom:24px; }
.btn-start {
  background:linear-gradient(135deg,#d4a574,#c89058); color:#0a0a16;
  border:none; padding:14px 44px; border-radius:50px;
  font-size:16px; font-weight:700; cursor:pointer; letter-spacing:1px;
  box-shadow:0 4px 20px rgba(212,165,116,0.2);
}
.btn-start:active { transform:scale(0.97); }
.cover-foot { font-size:10px; color:rgba(240,230,211,0.15); margin-top:24px; }

#quiz { display:none; padding:20px; max-width:600px; margin:0 auto; }
.q-text { font-size:17px; font-weight:600; margin-bottom:16px; line-height:1.5; }
.q-option { display:block; width:100%; padding:14px 16px; margin-bottom:10px; border:2px solid #eee; border-radius:12px; background:#fafafa; font-size:15px; text-align:left; cursor:pointer; color:#2d2d3a; }
.q-option.selected { border-color:#d4a574; background:#fef9f5; }
.q-nav { margin-top:16px; }
.btn-next { background:linear-gradient(135deg,#d4a574,#c4955a); color:#1a1a2e; border:none; padding:14px 24px; border-radius:50px; font-size:15px; font-weight:600; cursor:pointer; width:100%; }
.btn-next:disabled { opacity:0.35; cursor:not-allowed; }

#result { display:none; max-width:600px; margin:0 auto; padding:20px; }
.r-type { font-size:24px; font-weight:700; margin-bottom:10px; }
.r-slogan { font-size:14px; font-style:italic; color:#666; margin-bottom:16px; }
.r-card { background:#fff; border-radius:12px; padding:16px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.r-card h3 { font-size:14px; color:#c47a3a; margin-bottom:8px; }
.r-trait { padding:4px 0; font-size:13px; color:#7a7a8a; }
.r-actions { margin-top:16px; }
.btn-restart { border:2px solid #ddd; background:transparent; color:#7a7a8a; padding:14px; border-radius:50px; font-size:15px; width:100%; cursor:pointer; text-align:center; display:block; }
</style>
</head>
<body>

<div id="cover">
  <div class="cover-icon">&#127769;</div>
  <div class="cover-title">为什么你总在关系里<br>反复<em class="hl">猜对方在想什么</em>？</div>
  <div class="cover-sub">不是你太敏感——是你们的能量内核不同</div>
  <button class="btn-start" onclick="startQuiz()">开始测试</button>
  <div class="cover-foot">阴阳人格 · 能量内核测评 V5.4</div>
</div>

<div id="quiz">
  <div class="q-text" id="quizText"></div>
  <div id="quizOptions"></div>
  <div class="q-nav">
    <button class="btn-next" id="btnNext" onclick="nextQuestion()" disabled>下一题</button>
  </div>
</div>

<div id="result">
  <div class="r-type" id="rType"></div>
  <div class="r-slogan" id="rSlogan"></div>
  <div id="rContent"></div>
  <div class="r-actions">
    <button class="btn-restart" onclick="restart()">重新测试</button>
  </div>
</div>

<script>
var state = { step: 0, answers: [] };

var QUESTIONS = [
  { text: '当你被一个你在乎的人冷落或忽视时——你的本能更接近？',
    opts: ['反复琢磨——是不是我哪里做错了', '直接问或者直接翻篇'] },
  { text: '一段重要的关系走到终点后——你内心的状态更接近？',
    opts: ['反复回忆和复盘', '难过归难过但会让自己往前走'] },
  { text: '当你被误解时——你内心的状态更接近？',
    opts: ['反复解释和自证，必须确保对方没有看错你', '澄清事实，但说清楚就够了'] },
  { text: '约好的朋友临时放了你鸽子——你的第一反应更接近？',
    opts: ['会难过或生气', '有点不爽但很快就好了'] },
  { text: '当心里有件事让你不太舒服时——你内心的状态更接近？',
    opts: ['它会一直卡在那里反复消化', '虽然不舒服但会让它翻篇'] },
  { text: '做了一个重要的决定之后——你内心的状态更接近？',
    opts: ['会反复回头看', '决定了就往前走'] },
  { text: '当你在乎的人让你失望后——你消化这件事的方式更接近？',
    opts: ['从自己身上找原因', '在心里形成判断然后想怎么办'] },
  { text: '当别人对你提出期待且拒绝会让对方失望时——你内心的第一反应更接近？',
    opts: ['先考虑对方感受，先顺应', '先考虑自己意愿，直接表达'] },
  { text: '当你对现状不太满意，但改变有风险——你内心的本能更接近？',
    opts: ['先维持现状', '主动求变'] },
  { text: '当你在两个都不错的选项中做取舍时——你内心的模式更接近？',
    opts: ['反复权衡怕选错', '先选再说'] }
];

function startQuiz() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  state.step = 0;
  showQuestion();
}

function showQuestion() {
  var q = QUESTIONS[state.step];
  document.getElementById('quizText').textContent = q.text;
  var html = '';
  for (var i = 0; i < q.opts.length; i++) {
    html += '<button class="q-option" onclick="pickAnswer(' + state.step + ',' + i + ',this)">' + q.opts[i] + '</button>';
  }
  document.getElementById('quizOptions').innerHTML = html;
  document.getElementById('btnNext').disabled = true;
}

function pickAnswer(qi, oi, btn) {
  state.answers[qi] = oi;
  var btns = document.querySelectorAll('.q-option');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('selected');
  btn.classList.add('selected');
  document.getElementById('btnNext').disabled = false;
}

function nextQuestion() {
  state.step++;
  if (state.step < QUESTIONS.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  var yang = 0;
  for (var i = 0; i < state.answers.length; i++) {
    if (state.answers[i] === 0) yang++; // yang is first option
  }
  var isYang = yang >= 5;
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('rType').textContent = isYang ? '阳性能量' : '阴性能量';
  document.getElementById('rSlogan').textContent = yang + '/10 阳 判定明确';
  document.getElementById('rContent').innerHTML =
    '<div class="r-card"><h3>人格底色</h3><p class="r-trait">你的内核能量是' + (isYang ? '阳' : '阴') + '。这不是说你没有' + (isYang ? '阴' : '阳') + '的那一面，而是你面对核心冲突时的第一反应是' + (isYang ? '直面' : '观察') + '。</p></div>';
}

function restart() {
  state = { step: 0, answers: [] };
  document.getElementById('result').style.display = 'none';
  document.getElementById('cover').style.display = 'flex';
}
</script>
</body>
</html>
