<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>阴阳人格 · 能量内核测评</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  background:#faf8f5; color:#2d2d3a; line-height:1.6; min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── Cover ── */
#cover {
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:flex-end;
  padding:40px 24px 44px; text-align:center;
  background:linear-gradient(165deg,#080812,#12102a,#1a0f20,#0e0a18);
  color:#f0e6d3; position:relative;
}
.cv-icon { font-size:48px; margin-bottom:8px; line-height:1; }
.cv-hook { font-size:24px; font-weight:700; line-height:1.4; margin-bottom:6px; }
.cv-hook .hl { color:#d4a574; }
.cv-sub { font-size:13px; color:rgba(240,230,211,0.4); line-height:1.5; margin-bottom:16px; max-width:300px; }
.cv-pair { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:12px; }
.cv-dot { width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; }
.cv-dot.sun { background:rgba(196,122,58,0.15); border:1.5px solid rgba(196,122,58,0.3); color:#d4a574; }
.cv-dot.moon { background:rgba(74,106,154,0.15); border:1.5px solid rgba(74,106,154,0.3); color:#7a9aba; }
.cv-link { color:rgba(240,230,211,0.15); font-size:18px; }
.cv-compat { font-size:13px; color:rgba(240,230,211,0.3); line-height:1.5; margin-bottom:20px; }
.cv-compat .m { color:#d4a574; font-weight:600; }
.cv-compat .d { color:rgba(160,190,220,0.5); font-weight:600; }
.btn-start {
  background:linear-gradient(135deg,#d4a574,#c89058); color:#0a0a16;
  border:none; padding:14px 44px; border-radius:50px;
  font-size:16px; font-weight:700; cursor:pointer; letter-spacing:1px;
  box-shadow:0 4px 20px rgba(212,165,116,0.2);
  transition:transform 0.2s;
}
.btn-start:active { transform:scale(0.97); }
.cv-bottom { font-size:10px; color:rgba(240,230,211,0.1); margin-top:8px; letter-spacing:1px; }

/* ── Quiz ── */
#quiz { display:none; max-width:600px; margin:0 auto; }
.quiz-header { position:sticky; top:0; z-index:10; background:rgba(250,248,245,0.95); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); padding:14px 20px 10px; border-bottom:1px solid rgba(0,0,0,0.04); }
.progress-bar { background:#e8e4de; height:3px; border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#d4a574,#c4955a); border-radius:2px; transition:width 0.4s; width:0%; }
.quiz-meta { display:flex; justify-content:space-between; font-size:12px; color:#7a7a8a; margin-top:6px; }
.q-container { padding:16px 20px 120px; }
.q-card { background:#fff; border-radius:16px; padding:28px 24px; box-shadow:0 2px 16px rgba(0,0,0,0.06); margin-bottom:16px; display:none; }
.q-card.active { display:block; }
.q-header { font-size:12px; font-weight:600; color:#a09080; margin-bottom:12px; letter-spacing:1px; }
.q-text { font-size:17px; font-weight:600; margin-bottom:20px; line-height:1.5; }
.q-option { display:block; width:100%; padding:14px 16px; margin-bottom:10px; border:2px solid #eee; border-radius:12px; background:#fafafa; font-size:15px; text-align:left; cursor:pointer; color:#2d2d3a; line-height:1.4; transition:all 0.2s; }
.q-option:active { transform:scale(0.98); }
.q-option.selected { border-color:#d4a574; background:#fef9f5; box-shadow:0 0 0 2px rgba(212,165,116,0.15); }
.q-option .opt-label { display:inline-block; width:24px; height:24px; line-height:24px; text-align:center; border-radius:50%; background:#eee; font-size:12px; font-weight:600; margin-right:10px; color:#7a7a8a; }
.q-option.selected .opt-label { background:#d4a574; color:#fff; }
.q-nav { position:fixed; bottom:0; left:0; right:0; background:rgba(250,248,245,0.95); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); padding:12px 20px; display:flex; gap:12px; border-top:1px solid rgba(0,0,0,0.04); max-width:600px; margin:0 auto; }
.btn-next { flex:1; padding:14px; border:none; border-radius:50px; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s; background:linear-gradient(135deg,#d4a574,#c4955a); color:#1a1a2e; }
.btn-next:disabled { opacity:0.35; cursor:not-allowed; }

/* ── RESULT (rich version from V5.4 backup) ── */
#result { display:none; padding:0 0 40px; max-width:600px; margin:0 auto; }
#result.result-wrap.warm { --pg-bg:#faf3ec; --card-bg:#fffcf8; --card-border:rgba(196,122,58,0.08); --accent:#c47a3a; --accent-soft:#f5e6d0; --accent-light:#fef9f2; --accent-border:#f0e0d0; --evo-bg:#fdf6ee; --evo-border:#f5e8d8; --rel-bg:#fdf6ee; --rel-border:#f0e0d0; --rel-label:#f5efe6; }
#result.result-wrap.cool { --pg-bg:#eef0f4; --card-bg:#f7f8fc; --card-border:rgba(74,106,154,0.08); --accent:#4a6a9a; --accent-soft:#d0dcee; --accent-light:#f0f4fa; --accent-border:#d0dce8; --evo-bg:#eef4fa; --evo-border:#d8e0ee; --rel-bg:#eef4fa; --rel-border:#d0dce8; --rel-label:#e8eef6; }

/* Banner */
.r-banner { position:relative; width:100%; min-height:340px; overflow:hidden; }
.r-banner.warm { background:linear-gradient(135deg,#2d1b0e,#5a3a1a); }
.r-banner.cool { background:linear-gradient(135deg,#0f1a2e,#1a2a4a); }
.r-banner img { width:100%; height:340px; object-fit:cover; display:block; opacity:0; transition:opacity 0.5s ease; }
.r-banner.warm::after, .r-banner.cool::after { content:''; position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; }
.r-banner.warm::after { background:linear-gradient(180deg,rgba(90,50,20,0.35) 0%,transparent 35%,rgba(45,27,14,0.45) 100%); }
.r-banner.cool::after { background:linear-gradient(180deg,rgba(20,40,80,0.35) 0%,transparent 35%,rgba(15,26,46,0.45) 100%); }
.r-banner.warm .r-banner-overlay { background:linear-gradient(0deg,rgba(45,27,14,0.95) 0%,rgba(45,27,14,0.45) 55%,transparent 100%); }
.r-banner.cool .r-banner-overlay { background:linear-gradient(0deg,rgba(15,26,46,0.95) 0%,rgba(15,26,46,0.45) 55%,transparent 100%); }
.r-banner-overlay { position:absolute; bottom:0; left:0; right:0; padding:60px 24px 24px; text-align:center; color:#fff; }
.r-type { font-size:24px; font-weight:700; letter-spacing:2px; text-shadow:0 2px 8px rgba(0,0,0,0.5); }
.r-sub { font-size:12px; opacity:0.75; margin-top:4px; letter-spacing:1px; }
.r-slogan { font-size:15px; font-weight:500; margin-top:8px; line-height:1.5; opacity:0.9; font-style:italic; text-shadow:0 1px 6px rgba(0,0,0,0.5); }
.r-verdict { display:inline-block; margin-top:8px; padding:3px 12px; border-radius:10px; font-size:11px; font-weight:600; }
.r-verdict.high { background:rgba(46,204,113,0.3); color:#8eecb5; }
.r-verdict.mid { background:rgba(243,156,18,0.3); color:#f5c86a; }

/* Radar chart */
.r-radar { margin:0 16px 12px; background:var(--card-bg); border-radius:16px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,0.05); }
.r-radar-title { font-size:13px; font-weight:600; color:#7a7a8a; text-align:center; margin-bottom:14px; letter-spacing:1px; }
.radar-container { position:relative; width:100%; max-width:320px; margin:0 auto; }
.radar-container svg { width:100%; height:auto; }
.radar-legend { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:10px; }
.radar-legend-item { display:flex; align-items:center; gap:4px; font-size:11px; color:#7a7a8a; }
.radar-legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
#result.result-wrap.warm .radar-legend-dot.yang-dot { background:#c47a3a; }
#result.result-wrap.cool .radar-legend-dot.yang-dot { background:#4a6a9a; }
.radar-legend-dot.yin-dot { background:#d0d0d8; }

/* Content cards */
.r-content { padding:12px 16px; }
#result.result-wrap.warm .r-content { background:var(--pg-bg); }
#result.result-wrap.cool .r-content { background:var(--pg-bg); }
.r-card { background:var(--card-bg); border-radius:16px; padding:20px; margin-bottom:12px; box-shadow:0 2px 12px rgba(0,0,0,0.05); }
#result.result-wrap.warm .r-card { border:1px solid var(--card-border); }
#result.result-wrap.cool .r-card { border:1px solid var(--card-border); }
.r-card-title { font-size:14px; font-weight:700; color:var(--accent); margin-bottom:12px; letter-spacing:1px; display:flex; align-items:center; gap:6px; }
.r-card-title .line { flex:1; height:1px; }
#result.result-wrap.warm .r-card-title .line { background:var(--accent-border); }
#result.result-wrap.cool .r-card-title .line { background:var(--accent-border); }
.r-desc { font-size:14px; color:#2d2d3a; font-weight:600; margin-bottom:10px; line-height:1.5; }
.r-highlight { padding:8px 12px; border-radius:0 8px 8px 0; margin:6px 0; font-size:13px; color:#7a7a8a; line-height:1.6; font-weight:500; }
#result.result-wrap.warm .r-highlight { background:var(--accent-light); border-left:3px solid var(--accent); }
#result.result-wrap.cool .r-highlight { background:var(--accent-light); border-left:3px solid var(--accent); }
.r-trait { padding:8px 0 8px 22px; position:relative; font-size:13px; color:#7a7a8a; border-bottom:1px solid #f8f5f0; line-height:1.5; }
.r-trait:last-child { border:none; }
.r-trait::before { content:'\25C6'; position:absolute; left:0; color:var(--accent); font-size:8px; top:10px; }

/* Evolution section */
.r-evo-box { border-radius:12px; padding:14px 16px; margin-bottom:8px; }
#result.result-wrap.warm .r-evo-box { background:var(--evo-bg); border:1px solid var(--evo-border); }
#result.result-wrap.cool .r-evo-box { background:var(--evo-bg); border:1px solid var(--evo-border); }
.r-evo-box .lbl { font-size:11px; font-weight:600; color:var(--accent); letter-spacing:1px; margin-bottom:4px; }
.r-evo-box .txt { font-size:14px; color:#2d2d3a; line-height:1.5; font-weight:500; }
.r-arrow { text-align:center; padding:6px 0; font-size:20px; color:var(--accent); }
.r-step { font-size:12px; color:#7a7a8a; padding:5px 0 5px 18px; position:relative; line-height:1.5; }
.r-step::before { content:'\2192'; position:absolute; left:0; color:var(--accent); font-size:12px; }

/* Relationship section */
.r-relation-box { border-radius:12px; padding:12px 16px; margin-bottom:12px; }
#result.result-wrap.warm .r-relation-box { background:var(--rel-bg); }
#result.result-wrap.cool .r-relation-box { background:var(--rel-bg); }
.r-relation-box .lbl, .r-best-box .lbl { font-size:11px; font-weight:600; color:#7a7a8a; letter-spacing:1px; margin-bottom:4px; }
.r-relation-box .txt { font-size:13px; color:#2d2d3a; line-height:1.6; }
.r-best-box { display:flex; align-items:center; gap:10px; border-radius:12px; padding:12px 16px; margin-bottom:12px; }
#result.result-wrap.warm .r-best-box { background:var(--rel-bg); border:1px solid var(--rel-border); }
#result.result-wrap.cool .r-best-box { background:var(--rel-bg); border:1px solid var(--rel-border); }
.r-best-box .info { flex:1; }
.r-best-box .name { font-size:14px; font-weight:700; color:#2d2d3a; }
.r-best-box .why { font-size:12px; color:#7a7a8a; margin-top:2px; }
.r-pair-box { border-radius:12px; overflow:hidden; }
#result.result-wrap.warm .r-pair-box { border:1px solid var(--rel-border); }
#result.result-wrap.cool .r-pair-box { border:1px solid var(--rel-border); }
.r-pair-box .plbl { padding:10px 16px; font-size:11px; font-weight:600; letter-spacing:1px; }
#result.result-wrap.warm .r-pair-box .plbl { background:var(--rel-label); border-bottom:1px solid var(--rel-border); color:#7a7a8a; }
#result.result-wrap.cool .r-pair-box .plbl { background:var(--rel-label); border-bottom:1px solid var(--rel-border); color:#7a7a8a; }
.r-pair-item { padding:10px 16px; }
#result.result-wrap.warm .r-pair-item { border-bottom:1px solid var(--rel-border); }
#result.result-wrap.cool .r-pair-item { border-bottom:1px solid var(--rel-border); }
.r-pair-item:last-child { border-bottom:none; }
.r-pair-name { font-size:13px; font-weight:700; color:#2d2d3a; margin-bottom:3px; }
.r-pair-tag { display:inline-block; font-size:10px; padding:2px 8px; border-radius:6px; margin-left:6px; font-weight:600; }
.r-pair-tag.best { background:#e8f5e8; color:#27ae60; }
.r-pair-tag.challenge { background:#ffe8e8; color:#c0392b; }
.r-pair-tag.mirror { background:#e8f4f8; color:#2980b9; }
.r-pair-text { font-size:12px; color:#7a7a8a; line-height:1.5; }

/* Actions & footer */
.r-actions { padding:0 16px; }
.btn-restart { display:block; width:100%; padding:15px; border:2px solid #ddd; background:transparent; color:#7a7a8a; border-radius:50px; font-size:15px; font-weight:600; cursor:pointer; text-align:center; transition:all 0.2s; }
.btn-restart:active { background:#f5f3f0; }
.r-footer { text-align:center; font-size:11px; color:#7a7a8a; padding:20px; opacity:0.4; }
</style>
</head>
<body>

<div id="cover">
  <div class="cv-icon">&#127769;</div>
  <div class="cv-hook">为什么你总在关系里<br>反复<em class="hl">猜对方在想什么</em>？</div>
  <div class="cv-sub">不是你太敏感——是你们的能量内核<br>本来就不在一个频道上</div>
  <div class="cv-pair">
    <div class="cv-dot sun">阳</div>
    <div class="cv-link">&#x27F7;</div>
    <div class="cv-dot moon">阴</div>
  </div>
  <div class="cv-compat">测完你就知道——<span class="m">谁和你同频</span>，<br><span class="d">谁让你心累</span></div>
  <button class="btn-start" onclick="startQuiz()">免费测你的能量类型</button>
  <div class="cv-bottom">阴阳人格 · 能量内核测评 V5.4</div>
</div>

<div id="quiz">
  <div class="quiz-header">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="quiz-meta">
      <span id="progressText"></span>
      <span id="progressPhase"></span>
    </div>
  </div>
  <div class="q-container" id="questionContainer"></div>
  <div class="q-nav">
    <button class="btn-next" id="btnNext" onclick="nextQuestion()" disabled>下一题</button>
  </div>
</div>

<div id="result" class="result-wrap warm">
  <div class="r-banner" id="resultBanner">
    <img class="" id="resultPortrait" src="" alt="">
    <div class="r-banner-overlay">
      <div class="r-type" id="resultType"></div>
      <div class="r-sub" id="resultSubtype"></div>
      <div class="r-slogan" id="resultSlogan"></div>
      <div class="r-verdict" id="resultVerdict"></div>
    </div>
  </div>
  <div id="resultContent"></div>
  <div class="r-actions">
    <button class="btn-restart" onclick="restart()">&#x91CD;&#x65B0;&#x6D4B;&#x8BD5;</button>
  </div>
  <div class="r-footer">&#x9634;&#x9633;&#x4EBA;&#x683C; · V5.4</div>
</div>

<script>
// ===== QUESTIONS =====
// ===== QUESTIONS =====
var QUESTIONS = [
  { id:'q1', text:'当你被一个你在乎的人冷落或忽视时——你的本能更接近？',
    opts:[{t:'被冷落的瞬间，我最先感到的是“他是不是没那么在意我了”——连接感一空，我就忍不住怀疑是不是自己不够好',v:0},{t:'我先把事实摆平：是不是有误会？有就说开。我在意的是事有没有厘清，不在意你暂时的冷淡，清了就翻篇',v:1},{t:'我不会让任何人看出我被影响——表面照常，心里却反复确认“他到底什么意思”，这份不安我只自己消化',v:0}] },
  { id:'q2', text:'一段重要的关系走到终点后——你内心的状态更接近？',
    opts:[{t:'我会一直追问“为什么是我、哪里出了问题”——关系的断裂像在证明“我不够好、不值得被爱”，我得弄懂才能放',v:0},{t:'我把翻篇当成自己的事——难过归难过，但“结束”只是个事实，我不靠一段关系来定义自己，该走就走',v:1},{t:'我外面看着比谁都稳，其实夜里一遍遍回放——我不愿让人看见我多在意，把不舍锁起来自己慢慢耗',v:0}] },
  { id:'q3', text:'当你被误解时——你内心的状态更接近？',
    opts:[{t:'我怕的是你因此看错了真正的我——伤的不是事实，是我和你的连接，所以我急着让你懂，怕你因此离远',v:0},{t:'我把事实纠正过来就行——你说错了我更正，你怎么看我既不归我管也不想我管，说清就过',v:1},{t:'不是不想澄清，是不想显得我在乎到要解释的份上——转头自己把前因后果想通，懂没懂随你',v:0}] },
  { id:'q4', text:'约好的朋友临时放了你鸽子——你的第一反应更接近？',
    opts:[{t:'我会往“他是不是没那么重视我”上想——被放鸽子对我不是改计划，而是一次“我重不重要”的确认',v:0},{t:'计划变了就变，我自己也能安排得好——你的爽约不影响我的安排，也不影响我心情',v:1},{t:'我嘴上说“没事”，心里其实记下了——不是计较，是不想显得我多期待这次见面，那份失落我咽下去',v:0}] },
  { id:'q5', text:'当心里有件事让你不太舒服时——你内心的状态更接近？',
    opts:[{t:'那件事会一直挂着，因为我在反复体会它带来的感受——情绪对我需要被好好看见和消化，不是能说丢就丢',v:0},{t:'不舒服我就处理它，不打算让它占用我——我的能量花在解决上，不花在反复回味上',v:1},{t:'我外面看不出异样，其实独处时它一遍遍冒出来——我不习惯把这种不舒服摊开给人看，自己闷着想通',v:0}] },
  { id:'q6', text:'做了一个重要的决定之后——你内心的状态更接近？',
    opts:[{t:'我会反复想“是不是选错了、另一个会不会更好”——决定对我连着“会不会让人失望、自己后不后悔”，不只是理性取舍',v:0},{t:'决定下了就是下了——错了我再调，后悔没用，行动比反复确认更有意义',v:1},{t:'我嘴上说“定了”，心里其实还在悄悄推演各种可能——不想让人看出我多犹豫，把不确定自己兜着',v:0}] },
  { id:'q7', text:'当你在乎的人让你失望后——你消化这件事的方式更接近？',
    opts:[{t:'我会先往“是不是我哪里没做好、才换来这对待”上想——失望背后，我最怕的是“原来我没那么被珍惜”',v:0},{t:'我据此重新评估这段关系——你让我失望，我就在心里减分、调整距离，该设的界设立起来',v:1},{t:'我不闹也不质问，甚至显得更大度——其实心里把这段关系悄悄掂量几遍，只是不肯让人看见我在意，用退半步代替说破',v:0}] },
  { id:'q8', text:'当别人对你提出期待，且你知道拒绝会让对方失望时——你内心的第一反应更接近？',

var state = { step:'gender', gender:'', currentQ:-1, answers:{}, shuffled:{} };

function shuffleArray(a) { var b=[...a]; for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;} return b; }

function startQuiz() {
  document.getElementById('cover').style.display='none';
  document.getElementById('quiz').style.display='block';
  renderGender();
  window.scrollTo(0,0);
}

function renderGender() {
  state.step='gender';
  var c=document.getElementById('questionContainer');
  c.innerHTML='<div class="q-card active"><div class="q-header">&#128203; 基本信息</div><div class="q-text">你的生理性别是？</div><button class="q-option" onclick="pickGender(\'male\',this)"><span class="opt-label">A</span>男</button><button class="q-option" onclick="pickGender(\'female\',this)"><span class="opt-label">B</span>女</button></div>';
  updateProgress(0,'第一步：基本信息');
  document.getElementById('btnNext').disabled=true;
}

function pickGender(v,btn) {
  state.answers['gender']=v;
  state.gender=v;
  document.querySelectorAll('.q-option').forEach(function(b){b.classList.remove('selected');});
  btn.classList.add('selected');
  document.getElementById('btnNext').disabled=false;
  document.getElementById('btnNext').onclick=function(){startQuizCore();};
}

function startQuizCore() {
  document.getElementById('btnNext').onclick=nextQuestion;
  state.step='core'; state.currentQ=0;
  showQ(0);
  updateProgress(5,'能量探测中...');
  document.getElementById('progressText').textContent='第 1 / 10 题';
}

function showQ(idx) {
  var q=QUESTIONS[idx];
  var c=document.getElementById('questionContainer');
  // Shuffle once and reuse
  if(!state.shuffled[q.id]) state.shuffled[q.id]=shuffleArray(q.opts);
  var display=state.shuffled[q.id];
  var opts=display.map(function(o,i){
    var sel=state.answers[q.id]===o.v?'selected':'';
    return '<button class="q-option '+sel+'" onclick="pickA(\''+q.id+'\','+o.v+',this)"><span class="opt-label">'+String.fromCharCode(65+i)+'</span>'+o.t+'</button>';
  }).join('');
  c.innerHTML='<div class="q-card active"><div class="q-header">&#9889; 能量探测</div><div class="q-text">'+q.text+'</div>'+opts+'</div>';
  document.getElementById('btnNext').disabled=state.answers[q.id]===undefined;
  c.scrollIntoView({behavior:'smooth',block:'start'});
}

function pickA(qid,v,btn) {
  state.answers[qid]=v;
  document.querySelectorAll('.q-option').forEach(function(b){b.classList.remove('selected');});
  btn.classList.add('selected');
  document.getElementById('btnNext').disabled=false;
}

function nextQuestion() {
  state.currentQ++;
  if(state.currentQ<QUESTIONS.length){
    showQ(state.currentQ);
    var pct=5+((state.currentQ+1)/QUESTIONS.length)*85;
    updateProgress(pct,'能量探测中...');
    document.getElementById('progressText').textContent='第 '+(state.currentQ+1)+' / '+QUESTIONS.length+' 题';
  }else{
    showResult();
  }
}

function updateProgress(pct,phase) {
  document.getElementById('progressFill').style.width=Math.min(pct,100)+'%';
  document.getElementById('progressPhase').textContent=phase||'';
}

// ===== DIMENSION SCORES (for radar) =====
var DIMS = { rel:['q1','q2'], soc:['q3','q4'], inner:['q5','q6'], bound:['q7','q8'], decision:['q9','q10'] };
var DIM_LABELS = { rel:'\u2764\uFE0F \u60C5\u611F\u5173\u7CFB', soc:'\uD83E\uDD1D \u793E\u4F1A\u4EBA\u9645', inner:'\uD83E\uDDE0 \u5185\u5FC3\u6D88\u5316', bound:'\uD83D\uDEE1\uFE0F \u8FB9\u754C\u535A\u5F08', decision:'\uD83E\uDDED \u51B3\u7B56\u5192\u9669' };

function calcDimScores() {
  var ds = {};
  for (var key in DIMS) {
    var qs = DIMS[key];
    var y = 0, n = 0;
    for (var i = 0; i < qs.length; i++) {
      if (state.answers[qs[i]] !== undefined) { n++; if (state.answers[qs[i]] > 0.5) y++; }
    }
    ds[key] = { label: DIM_LABELS[key], score: n > 0 ? y/n : 0.5, yang: y, total: n };
  }
  return ds;
}

// ===== RADAR CHART SVG =====
function renderRadar(scores) {
  var size = 240, cx = size/2, cy = size/2, r = 90;
  var keys = ['rel','soc','inner','bound','decision'];
  var angleOffsets = [-90, -90+72, -90+144, -90+216, -90+288].map(function(d){return d*Math.PI/180;});
  var isWarm = document.getElementById('result').classList.contains('warm');
  var dataColor = isWarm ? '#c47a3a' : '#4a6a9a';
  var fillColor = isWarm ? 'rgba(196,122,58,0.12)' : 'rgba(74,106,154,0.12)';
  var labelColor = isWarm ? '#a08060' : '#607090';

  var svg = '<svg viewBox="0 0 '+size+' '+size+'" xmlns="http://www.w3.org/2000/svg">';

  // Grid
  for (var l = 1; l <= 4; l++) {
    var lr = (r/4)*l;
    var pts = angleOffsets.map(function(a){
      var x = cx + lr * Math.cos(a);
      var y = cy + lr * Math.sin(a);
      return x+','+y;
    }).join(' ');
    svg += '<polygon points="'+pts+'" fill="none" stroke="#eee" stroke-width="0.8"/>';
  }

  // Axes
  angleOffsets.forEach(function(a){
    svg += '<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a))+'" y2="'+(cy+r*Math.sin(a))+'" stroke="#e4e0da" stroke-width="0.8"/>';
  });

  // Data polygon
  var dataPts = keys.map(function(k,i){
    var val = (scores[k]&&scores[k].score!==undefined) ? scores[k].score : 0.5;
    var dist = r * val;
    return {x: cx+dist*Math.cos(angleOffsets[i]), y: cy+dist*Math.sin(angleOffsets[i]), val:val};
  });
  var ptsStr = dataPts.map(function(p){return p.x+','+p.y;}).join(' ');
  svg += '<polygon points="'+ptsStr+'" fill="'+fillColor+'" stroke="'+dataColor+'" stroke-width="1.5" stroke-linejoin="round"/>';
  dataPts.forEach(function(p){
    svg += '<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="'+dataColor+'"/>';
  });

  // Labels
  var labelNames = ['\u60C5\u611F\u5173\u7CFB','\u793E\u4F1A\u4EBA\u9645','\u5185\u5FC3\u6D88\u5316','\u8FB9\u754C\u535A\u5F08','\u51B3\u7B56\u5192\u9669'];
  var labelR = r + 22;
  angleOffsets.forEach(function(a,i){
    var x = cx + labelR * Math.cos(a);
    var y = cy + labelR * Math.sin(a);
    svg += '<text x="'+x+'" y="'+y+'" text-anchor="middle" dominant-baseline="central" font-size="10" fill="'+labelColor+'" font-weight="500">'+labelNames[i]+'</text>';
  });

  // Center score
  var totalYang = 0, totalN = 0;
  for (var k in scores) { totalYang += scores[k].yang || 0; totalN += scores[k].total || 0; }
  var totalScore = totalN > 0 ? Math.round(totalYang/totalN*100) : 50;
  svg += '<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" font-size="22" font-weight="700" fill="'+dataColor+'">'+totalScore+'%</text>';
  svg += '<text x="'+cx+'" y="'+(cy+14)+'" text-anchor="middle" font-size="10" fill="'+labelColor+'">\u9633\u6027\u80FD\u91CF</text>';

  svg += '</svg>';
  return svg;
}

  var pMap={};
  pMap['yang-male']='images/male-yang.jpg?v=1';
  pMap['yang-female']='images/female-yang.jpg?v=1';
  pMap['yin-female']='images/female-yin.jpg?v=1';
  pMap['yin-male']='images/male-yin.jpg?v=1';
  var pImg=document.getElementById('resultPortrait');
  if(pMap[key]){pImg.src=pMap[key];pImg.style.display='block';pImg.onload=function(){this.style.opacity='1';};pImg.onerror=function(){this.style.display='none';};}

  // Radar chart
  var dimScores = calcDimScores();
  var radarSvg = renderRadar(dimScores);
  var radarHtml = '<div class="r-radar"><div class="r-radar-title">\u2B50 \u4E94\u7EF4\u80FD\u91CF\u5206\u5E03</div><div class="radar-container">'+radarSvg+'</div><div class="radar-legend"><div class="radar-legend-item"><span class="radar-legend-dot yang-dot"></span>\u5404\u7EF4\u5EA6\u9633\u503E\u5411</div><div class="radar-legend-item"><span class="radar-legend-dot yin-dot"></span>\u5404\u7EF4\u5EA6\u9634\u503E\u5411</div></div></div>';

  // Content cards
  var stepsHtml=data.steps.map(function(s){return '<div class="r-step">'+s+'</div>';}).join('');
  var traitsHtml=data.traits.map(function(t){return '<div class="r-trait">'+t+'</div>';}).join('');
  var pairGuideHtml=data.pairGuide.map(function(p){return '<div class="r-pair-item"><div class="r-pair-name">'+p.target+'<span class="r-pair-tag '+p.tag+'">'+p.tagText+'</span></div><div class="r-pair-text">'+p.text+'</div></div>';}).join('');

  document.getElementById('resultContent').innerHTML=
    // Verdict card (simplified - no percentage bars)
    '<div class="r-card"><div class="r-card-title">\u2696\uFE0F \u5185\u6838\u5224\u5B9A <span class="line"></span></div>'+
    '<div style="text-align:center;padding:4px 0 12px;font-size:24px;font-weight:700;color:'+(isWarm?'#c47a3a':'#4a6a9a')+'">'+(isYang?'\u2600\uFE0F \u9633\u6027\u80FD\u91CF':'\uD83C\uDF19 \u9634\u6027\u80FD\u91CF')+'</div>'+
    '<div style="text-align:center;font-size:13px;color:#7a7a8a;margin-bottom:4px;">'+yang+' \u7968\u9633 &middot; '+yin+' \u7968\u9634 '+(decisive?'\u00B7 \u5224\u5B9A\u660E\u786E':'\u00B7 \u503E\u5411\u6E05\u6670')+'</div>'+
    '<div style="text-align:center;font-size:12px;color:#aaa;padding:8px 12px;background:'+(isWarm?'#fef9f5':'#f0f4fa')+';border-radius:8px;line-height:1.5;">\u4F60\u7684\u5185\u6838\u80FD\u91CF\u662F'+(isYang?'\u9633':'\u9634')+'——这不是说你没有'+(isYang?'\u9634':'\u9633')+'的那一面，<br>\u800C\u662F\u4F60\u9762\u5BF9\u6838\u5FC3\u51B2\u7A81\u65F6\u7684\u7B2C\u4E00\u53CD\u5E94\u662F'+(isYang?'\u76F4\u9762':'\u89C2\u5BDF')+'。</div></div>'+

    radarHtml+

    '<div class="r-content">'+
      '<div class="r-card"><div class="r-card-title">\uD83C\uDFA8 \u4EBA\u683C\u5E95\u8272 <span class="line"></span></div>'+
      '<div class="r-desc">'+data.core+'</div>'+
      '<div class="r-highlight">'+data.highlight+'</div>'+
      traitsHtml+'</div>'+

      '<div class="r-card"><div class="r-card-title">\uD83C\uDF31 \u8FDB\u5316\u8BFE\u9898 &rarr; \u6210\u957F\u65B9\u5411 <span class="line"></span></div>'+
      '<div class="r-evo-box"><div class="lbl">\u25C6 \u8BFE\u9898</div><div class="txt">'+data.challenge+'</div></div>'+
      '<div class="r-arrow">\u2193</div>'+
      '<div class="r-evo-box"><div class="lbl">\u2192 \u6210\u957F\u65B9\u5411</div><div class="txt">'+data.growth+'</div>'+stepsHtml+'</div></div>'+

      '<div class="r-card"><div class="r-card-title">\uD83C\uDF0A \u5173\u7CFB\u5C42\u9762 <span class="line"></span></div>'+
      '<div class="r-relation-box"><div class="lbl">\u5173\u7CFB\u6A21\u5F0F</div><div class="txt">'+data.relationMode+'</div></div>'+
      '<div class="r-best-box"><div class="info"><div class="name">\uD83D\uDCAB '+data.bestMatch.name+'</div><div class="why">'+data.bestMatch.why+'</div></div></div>'+
      '<div class="r-pair-box"><div class="plbl">\u914D\u5BF9\u6307\u5F15</div>'+pairGuideHtml+'</div></div>'+
    '</div>';

  document.getElementById('quiz').style.display='none';
  document.getElementById('result').style.display='block';
  window.scrollTo(0,0);
}

function restart() {
  state={step:'gender',gender:'',currentQ:-1,answers:{},shuffled:{}};
  document.getElementById('result').style.display='none';
  document.getElementById('quiz').style.display='none';
  document.getElementById('cover').style.display='flex';
  window.scrollTo(0,0);
}
// Preload all character portraits as soon as page loads
(function(){
  var imgs=['male-yang.jpg?v=1','male-yin.jpg?v=1','female-yang.jpg?v=1','female-yin.jpg?v=1'];
  for(var i=0;i<imgs.length;i++){var a=new Image();a.src='images/'+imgs[i];}
})();
</script>
